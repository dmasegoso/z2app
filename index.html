<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Dani · App</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;padding:0}
input{font-family:inherit}
img,svg{display:block;max-width:100%}

/* ── Tokens ── */
:root{
  --c-bg:#0a0a0a;--c-bg-2:#0f0f0f;--c-surface:#141414;--c-surface-2:#1c1c1c;--c-surface-3:#262626;
  --c-text:#faf8f3;--c-text-muted:#8a8780;--c-text-subtle:#56544f;
  --c-border:rgba(250,248,243,0.08);--c-border-strong:rgba(250,248,243,0.16);
  --c-accent:#ff5a3a;--c-accent-2:#e84a2c;--c-accent-soft:rgba(255,90,58,0.14);--c-accent-on:#0a0a0a;
  --c-warm:#ffd166;--c-warm-soft:rgba(255,209,102,0.14);
  --c-z1:#5a8fff;--c-z2:#4ade80;--c-z3:#ffd166;--c-z4:#ff8c3a;--c-z5:#ef4a4a;
  --c-good:#4ade80;--c-bad:#ef4a4a;--c-warn:#ffd166;
  --f-d:'Bricolage Grotesque',ui-sans-serif,sans-serif;
  --f-b:'Geist',ui-sans-serif,sans-serif;
  --f-m:'Geist Mono',ui-monospace,monospace;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-pill:999px;
}
[data-theme="light"]{
  --c-bg:#faf7f0;--c-bg-2:#f4efe2;--c-surface:#fff;--c-surface-2:#f4efe3;--c-surface-3:#ebe5d4;
  --c-text:#0a0a0a;--c-text-muted:#6b6864;--c-text-subtle:#a09c92;
  --c-border:rgba(10,10,10,0.08);--c-border-strong:rgba(10,10,10,0.18);
  --c-accent-on:#fff;
}

/* ── Shell ── */
body{
  font-family:var(--f-b);font-size:15px;color:var(--c-text);
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1200px 600px at 80% -10%,color-mix(in oklab,var(--c-accent) 12%,transparent),transparent 60%),
    radial-gradient(900px 700px at -10% 110%,color-mix(in oklab,var(--c-warm) 10%,transparent),transparent 60%),
    var(--c-bg);
  display:grid;place-items:center;min-height:100dvh;
}
.frame{
  width:100%;max-width:400px;height:100dvh;max-height:820px;
  background:var(--c-bg-2);border-radius:36px;
  box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px var(--c-border);
  overflow:hidden;display:flex;flex-direction:column;position:relative;
}
@media(max-width:500px){
  html,body{height:100%;height:100dvh}
  body{display:block;background:var(--c-bg-2);padding:0}
  .frame{
    border-radius:0;max-height:none;box-shadow:none;
    height:100dvh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
}

/* ── Status bar ── */
.status{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 26px 6px;font-family:var(--f-b);font-size:14px;font-weight:600;
  flex-shrink:0;
}
.status .icons{display:flex;gap:6px;align-items:center;opacity:.85}

/* ── Screens ── */
.screen{flex:1;display:flex;flex-direction:column;min-height:0;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.pad{padding:4px 20px 110px}
@media(max-width:500px){
  #statusbar{display:none}
  .pad{padding-bottom:calc(110px + env(safe-area-inset-bottom))}
}

/* ── Typography ── */
h1{font-family:var(--f-d);font-weight:600;font-size:28px;letter-spacing:-.025em;margin:0;line-height:1.1}
h2{font-family:var(--f-d);font-weight:600;font-size:18px;letter-spacing:-.015em;margin:0}
.eyebrow{font-family:var(--f-m);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--c-text-muted);font-weight:500}
.num{font-family:var(--f-d);font-weight:500;letter-spacing:-.03em;font-feature-settings:'tnum'}
.mono{font-family:var(--f-m);font-feature-settings:'tnum'}
.muted{color:var(--c-text-muted)}
.subtle{color:var(--c-text-subtle)}
.title-md{font-family:var(--f-d);font-weight:600;font-size:20px;letter-spacing:-.02em;line-height:1.15}
.title-sm{font-family:var(--f-d);font-weight:600;font-size:15.5px;letter-spacing:-.015em;line-height:1.2}

/* ── Header ── */
.hdr{padding:10px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-shrink:0}
.hdr-meta{font-family:var(--f-m);font-size:11px;letter-spacing:.08em;color:var(--c-text-muted);margin-bottom:6px;text-transform:uppercase}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--c-surface-2);border:1px solid var(--c-border);display:grid;place-items:center;font-family:var(--f-d);font-weight:600;font-size:14px;flex-shrink:0;cursor:pointer}

/* ── Cards ── */
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);padding:16px}
.card+.card{margin-top:10px}
.card.tinted{background:var(--c-surface-2)}
.card-link{font-family:var(--f-b);font-weight:500;font-size:12px;color:var(--c-accent);display:inline-flex;align-items:center;gap:4px;background:none;border:0;cursor:pointer}

/* ── Section ── */
.sec{margin-top:22px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:baseline}

/* ── Layout utils ── */
.row{display:flex;align-items:center;gap:10px}
.col{display:flex;flex-direction:column}
.grow{flex:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.divider{height:1px;background:var(--c-border);margin:14px 0}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:44px;padding:0 20px;font-family:var(--f-b);font-size:14px;font-weight:600;border-radius:var(--r-pill);transition:transform .06s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--c-accent);color:var(--c-accent-on)}
.btn-ghost{background:var(--c-surface-2);color:var(--c-text);border:1px solid var(--c-border)}
.btn-sm{height:34px;padding:0 13px;font-size:12.5px}
.btn-block{width:100%}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-pill);background:var(--c-surface-2);border:1px solid var(--c-border);font-family:var(--f-m);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--c-text-muted)}
.pill.solid{background:var(--c-accent);color:var(--c-accent-on);border-color:transparent}
.pill.good{background:rgba(74,222,128,.12);color:var(--c-good);border-color:transparent}
.pill.warm{background:var(--c-warm-soft);color:var(--c-warm);border-color:transparent}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── Zone bar ── */
.zonebar{display:flex;gap:3px;height:7px;border-radius:var(--r-pill);overflow:hidden}
.zonebar>div{flex:1;background:var(--c-surface-2)}

/* ── Zone spectrum ── */
.zspec{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.zcell{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px 8px;border-radius:var(--r-md);background:var(--c-surface-2);border:1px solid transparent}
.zcell.on{border-color:var(--c-border-strong);background:var(--c-surface-3)}
.zcell .sw{width:12px;height:12px;border-radius:3px}
.zcell .zl,.zcell .zp{font-family:var(--f-m);font-size:10px;color:var(--c-text-muted)}
.zcell.on .zl,.zcell.on .zp{color:var(--c-text)}

/* ── Macro bar ── */
.macrobar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--c-surface-2)}

/* ── Input ── */
.input{width:100%;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-pill);padding:11px 18px;color:var(--c-text);font-size:14px;outline:none;transition:border-color .18s}
.input:focus{border-color:var(--c-accent)}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;white-space:nowrap;padding:7px 13px;font-size:13px;font-weight:500;border-radius:var(--r-pill);background:var(--c-surface);border:1px solid var(--c-border);color:var(--c-text);cursor:pointer;transition:border-color .15s,color .15s,background .15s;flex-shrink:0}
.chip:hover{border-color:var(--c-accent);color:var(--c-accent)}
.chip.sel{background:var(--c-accent-soft);border-color:var(--c-accent);color:var(--c-accent)}

/* ── Chat bubbles ── */
.bubble-wrap{display:flex;gap:8px;margin-bottom:12px}
.bubble-wrap.user{flex-direction:row-reverse}
.ai-dot{width:28px;height:28px;border-radius:50%;background:var(--c-accent-soft);border:1px solid var(--c-border);display:grid;place-items:center;flex-shrink:0;align-self:flex-end}
.bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.5}
.bubble.ai{background:var(--c-surface);border:1px solid var(--c-border);border-radius:16px 16px 16px 4px}
.bubble.user{background:var(--c-accent);color:var(--c-accent-on);border-radius:16px 16px 4px 16px}

/* ── Bottom nav ── */
.nav{
  position:absolute;left:10px;right:10px;
  bottom:calc(10px + env(safe-area-inset-bottom));
  background:color-mix(in oklab,var(--c-surface) 92%,transparent);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--c-border);border-radius:var(--r-pill);
  padding:5px;display:flex;justify-content:space-between;z-index:5;
  box-shadow:0 12px 32px rgba(0,0,0,.3);
}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;border-radius:var(--r-pill);color:var(--c-text-muted);transition:background .18s,color .18s;font-size:11.5px;font-weight:500}
.nav-item.active{background:var(--c-accent);color:var(--c-accent-on)}
.nav-item .lbl{display:none}
.nav-item.active .lbl{display:inline}

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:none}}
@keyframes fillbar{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* ── Sheet ── */
.sheet-bd{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:20;backdrop-filter:blur(3px)}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--c-bg-2);border-radius:22px 22px 0 0;padding:16px 20px 32px;z-index:21;animation:sheetup .28s cubic-bezier(.2,.8,.2,1)}
.handle{width:32px;height:4px;border-radius:2px;background:var(--c-border-strong);margin:0 auto 14px}

/* ── YouTube embed ── */
.yt-wrap{position:relative;width:100%;border-radius:var(--r-md);overflow:hidden;background:#000;cursor:pointer;aspect-ratio:16/9}
.yt-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28)}
.yt-play-btn{width:58px;height:42px;background:rgba(220,0,0,.92);border-radius:9px;display:flex;align-items:center;justify-content:center}
.yt-iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:var(--r-md);display:block}

/* ── Series table ── */
.series-hdr{display:grid;grid-template-columns:24px 1fr 1fr 34px;gap:6px;padding:5px 2px 7px;border-bottom:1px solid var(--c-border)}
.serie-row{display:grid;grid-template-columns:24px 1fr 1fr 34px;gap:6px;align-items:center;padding:7px 2px;border-bottom:1px solid var(--c-border)}
.serie-row:last-child{border-bottom:none}
.serie-num{font-family:var(--f-m);font-size:11px;color:var(--c-text-muted);text-align:center}
.serie-input{width:100%;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:8px;padding:7px 4px;color:var(--c-text);font-size:14px;font-family:var(--f-m);text-align:center;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.serie-input::-webkit-outer-spin-button,.serie-input::-webkit-inner-spin-button{-webkit-appearance:none}
.serie-input:focus{border-color:var(--c-accent)}
.check-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;border:1.5px solid var(--c-border);background:var(--c-surface-2);cursor:pointer;transition:all .15s;justify-self:center}
.check-btn.done{background:var(--c-good);border-color:var(--c-good);color:#0a0a0a}
</style>
</head>
<body>
<div class="frame" id="app">
  <div class="status" id="statusbar" style="position:relative">
    <span id="clock">9:41</span>
    <span id="sync-dot" style="position:absolute;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--c-good);opacity:0;transition:opacity .3s;animation:pulse 1s infinite"></span>
    <div class="icons">
      <svg width="16" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="11" rx="1" opacity=".35"/></svg>
      <svg width="14" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
      <svg width="23" height="11" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y=".5" width="22" height="10.5" rx="2.8" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="1.8" y="2.2" width="18.4" height="7.1" rx="1.5"/><rect x="22.5" y="4" width="1.5" height="3.5" rx=".5"/></svg>
    </div>
  </div>

  <div id="screen" class="screen"></div>

  <nav class="nav">
    <button class="nav-item active" id="n-home" onclick="go('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg>
      <span class="lbl">Hoy</span>
    </button>
    <button class="nav-item" id="n-plan" onclick="go('plan')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
      <span class="lbl">Plan</span>
    </button>
    <button class="nav-item" id="n-nutricion" onclick="go('nutricion')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v9a3 3 0 0 0 3 3v6"/><path d="M9 3v6M13 3v6"/><path d="M17 3c2 0 3 2 3 6s-1 6-3 6v6"/></svg>
      <span class="lbl">Comida</span>
    </button>
    <button class="nav-item" id="n-progreso" onclick="go('progreso')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8M9 21V4M15 21v-9M21 21v-6"/></svg>
      <span class="lbl">Progreso</span>
    </button>
    <button class="nav-item" id="n-coach" onclick="go('coach')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 21l1.8-5.5A8 8 0 1 1 21 12z"/></svg>
      <span class="lbl">Coach</span>
    </button>
  </nav>
</div>

<script>
// ── Exercise data ──────────────────────────────────────────
const EXERCISES = [
  {
    name:'Press banca plano', sets:'4 × 6', rest:"2' desc", kg:80, ytId:'vcBig73ojpE',
    tip:'Mantén los omóplatos retraídos y en arco neutro durante todo el movimiento para proteger el hombro.',
    cues:[
      'Agarre ligeramente más ancho que los hombros, codos a 45° del torso',
      'Baja la barra al pecho inferior de forma controlada en 2–3 segundos',
      'Empuja explosivamente manteniendo los pies en el suelo y el core tenso'
    ]
  },
  {
    name:'Remo en barra', sets:'4 × 8', rest:'90″', kg:70, ytId:'FWJR5Ve8UtQ',
    tip:'Inicia el movimiento retrayendo las escápulas antes de doblar el codo para activar correctamente la espalda.',
    cues:[
      'Espalda paralela al suelo o con leve inclinación, rodillas ligeramente flexionadas',
      'Lleva la barra al ombligo con los codos pegados al torso',
      'Contrae la espalda alta 1 segundo en la posición más alta antes de bajar'
    ]
  },
  {
    name:'Press militar', sets:'3 × 10', rest:'90″', kg:50, ytId:'2yjwXTZQDDI',
    tip:'Activa el glúteo y el core para proteger la zona lumbar cuando empujas por encima de la cabeza.',
    cues:[
      'Barra a la altura de la clavícula, agarre a anchura de hombros o ligeramente más',
      'Empuja verticalmente sin arquear en exceso la zona lumbar',
      'Bloquea los codos en la cima sin hiperextender las muñecas'
    ]
  },
  {
    name:'Curl bíceps barra', sets:'3 × 12', rest:'60″', kg:30, ytId:'ykJmrZ5v0Oo',
    tip:'El movimiento debe originarse en el codo; evita balancear el torso para no restar tensión al bíceps.',
    cues:[
      'Codos pegados a los costados durante toda la repetición, no los dejes volar',
      'Sube controlando 1 segundo, baja con control en 2 segundos',
      'Detente justo antes de la extensión completa para mantener tensión constante'
    ]
  },
  {
    name:'Tríceps polea', sets:'3 × 12', rest:'60″', kg:25, ytId:'kiuVA0gs3EI',
    tip:'Mantén los codos fijos al costado y el torso ligeramente inclinado hacia delante para aislar el tríceps.',
    cues:[
      'Codos a los costados en todo momento, no los dejes abrirse',
      'Extiende completamente el codo al final de cada repetición',
      'Controla la vuelta lentamente para mantener tensión en la fase excéntrica'
    ]
  },
];

// ── Storage helpers ────────────────────────────────────────
const CFG = {
  get: () => { try { return JSON.parse(localStorage.getItem('z2_cfg') || '{}'); } catch(e) { return {}; } },
  set: (d) => localStorage.setItem('z2_cfg', JSON.stringify({...CFG.get(), ...d})),
};
const TKNS = {
  get: () => { try { return JSON.parse(localStorage.getItem('z2_tkns') || '{}'); } catch(e) { return {}; } },
  set: (d) => localStorage.setItem('z2_tkns', JSON.stringify({...TKNS.get(), ...d})),
  del: (prefix) => {
    const t = TKNS.get();
    Object.keys(t).filter(k => k.startsWith(prefix)).forEach(k => delete t[k]);
    localStorage.setItem('z2_tkns', JSON.stringify(t));
  },
};
const DCACHE = {
  TTL: { strava: 5 * 60 * 1000, withings: 60 * 60 * 1000 }, // Strava 5 min, Withings 1 h
  get: (k) => { try { const v = JSON.parse(localStorage.getItem('z2_dc_' + k)); return (v && Date.now() - v.ts < (DCACHE.TTL[k] ?? 3600000)) ? v.d : null; } catch(e) { return null; } },
  set: (k, d) => localStorage.setItem('z2_dc_' + k, JSON.stringify({ts: Date.now(), d})),
  clear: (k) => k ? localStorage.removeItem('z2_dc_' + k) : Object.keys(localStorage).filter(k => k.startsWith('z2_dc_')).forEach(k => localStorage.removeItem(k)),
};

// ── Strava ─────────────────────────────────────────────────
const STRAVA_AUTH  = 'https://www.strava.com/oauth/authorize';
const STRAVA_TOKEN = 'https://www.strava.com/oauth/token';
const STRAVA_API   = 'https://www.strava.com/api/v3';

const stravaConnected = () => !!TKNS.get().strava_access;
// URI fija — debe coincidir EXACTAMENTE con lo registrado en Strava / Withings
const REDIRECT_URI = 'https://dmasegoso.github.io/z2app/';
const redirectUri = () => REDIRECT_URI;

function stravaConnect() {
  const id = document.getElementById('s-id')?.value.trim() || CFG.get().strava_id;
  const sec = document.getElementById('s-sec')?.value.trim() || CFG.get().strava_secret;
  if (id) CFG.set({strava_id: id});
  if (sec) CFG.set({strava_secret: sec});
  if (!CFG.get().strava_id || !CFG.get().strava_secret) {
    S.ajErr = 'Rellena Client ID y Client Secret de Strava.'; renderSheet(); return;
  }
  location.href = `${STRAVA_AUTH}?client_id=${CFG.get().strava_id}&redirect_uri=${encodeURIComponent(redirectUri())}&response_type=code&scope=read,activity:read_all&state=strava`;
}

function stravaDisconnect() { TKNS.del('strava_'); DCACHE.clear(); S.liveData = {}; S.sheet = 'ajustes'; render(); }

async function stravaExchange(code) {
  const cfg = CFG.get();
  const r = await fetch(STRAVA_TOKEN, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({client_id: cfg.strava_id, client_secret: cfg.strava_secret, code, grant_type: 'authorization_code'}),
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  if (!d.access_token) throw new Error(d.message || 'Sin token');
  TKNS.set({strava_access: d.access_token, strava_refresh: d.refresh_token, strava_expires: d.expires_at,
    strava_name: `${d.athlete?.firstname||''} ${d.athlete?.lastname||''}`.trim()});
}

async function stravaRefresh() {
  const cfg = CFG.get(), t = TKNS.get();
  if (!t.strava_refresh) { TKNS.del('strava_'); return false; }
  if (t.strava_expires > Date.now() / 1000 + 60) return true;
  try {
    const r = await fetch(STRAVA_TOKEN, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({client_id: cfg.strava_id, client_secret: cfg.strava_secret, refresh_token: t.strava_refresh, grant_type: 'refresh_token'}),
    });
    const d = await r.json();
    if (!d.access_token) { TKNS.del('strava_'); return false; }
    TKNS.set({strava_access: d.access_token, strava_refresh: d.refresh_token, strava_expires: d.expires_at});
    return true;
  } catch(e) { return false; }
}

async function stravaGet(path) {
  if (!await stravaRefresh()) throw new Error('not_connected');
  const r = await fetch(STRAVA_API + path, {headers: {Authorization: 'Bearer ' + TKNS.get().strava_access}});
  if (!r.ok) throw new Error('Strava ' + r.status);
  return r.json();
}

function calcTSS(act) {
  const ftp = parseInt(CFG.get().ftp) || 200;
  const np = act.weighted_average_watts;
  if (!np) return null;
  const IF = np / ftp;
  return Math.round((act.moving_time * np * IF) / (ftp * 3600) * 100);
}

function fmtActivity(act) {
  const d = new Date(act.start_date_local);
  const days = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  const dateStr = `${days[d.getDay()]} ${d.getDate()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const mins = Math.round(act.moving_time / 60);
  const h = Math.floor(mins / 60), m = mins % 60;
  return {
    date: dateStr,
    name: act.name,
    duration: h > 0 ? `${h}h ${m}m` : `${mins}m`,
    distance: (act.distance / 1000).toFixed(1),
    tss: calcTSS(act),
    hr: act.average_heartrate ? Math.round(act.average_heartrate) : null,
    np: act.weighted_average_watts || null,
    kcal: act.kilojoules ? Math.round(act.kilojoules * 4.184) : null,
    type: act.type,
  };
}

async function loadStravaData() {
  const cached = DCACHE.get('strava');
  if (cached) return cached;
  const acts = await stravaGet('/athlete/activities?per_page=15');
  const data = { activities: acts };
  DCACHE.set('strava', data);
  return data;
}

const WITHINGS_AUTH  = 'https://account.withings.com/oauth2_user/authorize2';
const WITHINGS_TOKEN = 'https://wbsapi.withings.net/v2/oauth2';
const WITHINGS_API   = 'https://wbsapi.withings.net';

const withingsConnected = () => !!TKNS.get().withings_access;

function withingsConnect() {
  const id = document.getElementById('w-id')?.value.trim() || CFG.get().withings_id;
  const sec = document.getElementById('w-sec')?.value.trim() || CFG.get().withings_secret;
  if (id) CFG.set({withings_id: id});
  if (sec) CFG.set({withings_secret: sec});
  if (!CFG.get().withings_id || !CFG.get().withings_secret) {
    S.ajErr = 'Rellena Client ID y Client Secret de Withings.'; renderSheet(); return;
  }
  const scope = encodeURIComponent('user.info,user.metrics,user.sleepevents');
  location.href = `${WITHINGS_AUTH}?client_id=${CFG.get().withings_id}&redirect_uri=${encodeURIComponent(redirectUri())}&response_type=code&scope=${scope}&state=withings`;
}

function withingsDisconnect() { TKNS.del('withings_'); DCACHE.clear(); S.liveData = {}; S.sheet = 'ajustes'; render(); }

async function withingsExchange(code) {
  const cfg = CFG.get();
  const body = new URLSearchParams({action:'requesttoken', client_id: cfg.withings_id, client_secret: cfg.withings_secret,
    code, grant_type: 'authorization_code', redirect_uri: redirectUri()});
  const r = await fetch(WITHINGS_TOKEN, {method:'POST', body});
  const d = await r.json();
  if (!d.body?.access_token) throw new Error(d.error || 'Sin token');
  TKNS.set({withings_access: d.body.access_token, withings_refresh: d.body.refresh_token,
    withings_expires: Date.now() / 1000 + d.body.expires_in});
}

async function withingsRefresh() {
  const cfg = CFG.get(), t = TKNS.get();
  if (!t.withings_refresh) { TKNS.del('withings_'); return false; }
  if (t.withings_expires > Date.now() / 1000 + 60) return true;
  try {
    const body = new URLSearchParams({action:'requesttoken', client_id: cfg.withings_id, client_secret: cfg.withings_secret,
      refresh_token: t.withings_refresh, grant_type: 'refresh_token'});
    const r = await fetch(WITHINGS_TOKEN, {method:'POST', body});
    const d = await r.json();
    if (!d.body?.access_token) { TKNS.del('withings_'); return false; }
    TKNS.set({withings_access: d.body.access_token, withings_refresh: d.body.refresh_token,
      withings_expires: Date.now() / 1000 + d.body.expires_in});
    return true;
  } catch(e) { return false; }
}

async function withingsGet(path, params = {}) {
  if (!await withingsRefresh()) throw new Error('not_connected');
  const url = new URL(WITHINGS_API + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const r = await fetch(url, {headers: {Authorization: 'Bearer ' + TKNS.get().withings_access}});
  if (!r.ok) throw new Error('Withings ' + r.status);
  return r.json();
}

function parseWithings(groups) {
  const sorted = [...groups].sort((a, b) => b.date - a.date);
  if (!sorted.length) return {};
  const latest = sorted[0];
  const res = {};
  for (const m of latest.measures) {
    const v = m.value * Math.pow(10, m.unit);
    if (m.type === 1) res.weight = v;
    if (m.type === 6) res.fatPct = v;
    if (m.type === 76) res.muscle = v;
  }
  // sparkline: last 8 measurements with weight
  res.weightHistory = sorted.slice(0, 8).reverse().map(g => {
    const w = g.measures.find(m => m.type === 1);
    return w ? +(w.value * Math.pow(10, w.unit)).toFixed(1) : null;
  }).filter(Boolean);
  return res;
}

async function loadWithingsData() {
  const cached = DCACHE.get('withings');
  if (cached) return cached;
  const meas = await withingsGet('/measure', {action: 'getmeas', meastype: '1,6,76'});
  const data = {measures: meas.body?.measuregrps || []};
  DCACHE.set('withings', data);
  return data;
}

const ring = (val, size, stroke, color, inner) => {
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-Math.min(100,Math.max(0,val))/100);
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--c-surface-2)" stroke-width="${stroke}" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${inner}</div>
  </div>`;
};

const macrobar = (p,c,f) => {
  const t=p+c+f;
  return `<div class="macrobar">
    <div style="width:${(p/t*100).toFixed(1)}%;background:var(--c-z2)"></div>
    <div style="width:${(c/t*100).toFixed(1)}%;background:var(--c-z1)"></div>
    <div style="width:${(f/t*100).toFixed(1)}%;background:var(--c-warm)"></div>
  </div>`;
};

const macroChips = (p,c,f) => [
  {l:'P',v:p,col:'var(--c-z2)'},{l:'C',v:c,col:'var(--c-z1)'},{l:'G',v:f,col:'var(--c-warm)'}
].map(m=>`<div><div class="row" style="gap:4px"><span style="width:7px;height:7px;border-radius:2px;background:${m.col}"></span><span class="mono muted" style="font-size:10px">${m.l}</span></div><div class="num" style="font-size:17px;margin-top:2px">${m.v}<span class="mono muted" style="font-size:10px;margin-left:1px">g</span></div></div>`).join('');

const zonebar = (active) => {
  const cols=['var(--c-z1)','var(--c-z2)','var(--c-z3)','var(--c-z4)','var(--c-z5)'];
  return `<div class="zonebar">${[1,2,3,4,5].map(z=>`<div style="${z===active?`background:${cols[z-1]}`:''}"></div>`).join('')}</div>`;
};

const zonespec = (dist, active) => {
  const labels=['Z1','Z2','Z3','Z4','Z5'];
  const cols=['var(--c-z1)','var(--c-z2)','var(--c-z3)','var(--c-z4)','var(--c-z5)'];
  return `<div class="zspec">${labels.map((l,i)=>`
    <div class="zcell ${i===active-1?'on':''}">
      <div class="sw" style="background:${cols[i]}"></div>
      <div class="zl">${l}</div>
      ${dist?`<div class="zp">${dist[i]}%</div>`:''}
    </div>`).join('')}</div>`;
};

// Animated horizontal zone bars for post-workout summary
const zonespecAnimated = (dist, active) => {
  const labels=['Z1','Z2','Z3','Z4','Z5'];
  const cols=['var(--c-z1)','var(--c-z2)','var(--c-z3)','var(--c-z4)','var(--c-z5)'];
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${labels.map((l,i)=>`
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:20px;font-family:var(--f-m);font-size:10.5px;color:${i===active-1?cols[i]:'var(--c-text-muted)'};font-weight:${i===active-1?600:400}">${l}</div>
        <div style="flex:1;height:7px;background:var(--c-surface-2);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${dist[i]}%;background:${cols[i]};border-radius:4px;transform-origin:left;animation:fillbar .7s ${(i*0.09).toFixed(2)}s cubic-bezier(.2,.8,.2,1) both"></div>
        </div>
        <div style="font-family:var(--f-m);font-size:11px;min-width:28px;text-align:right;color:${i===active-1?cols[i]:'var(--c-text-muted)'}">${dist[i]}%</div>
      </div>`).join('')}
  </div>`;
};

const sparkline = (data, color) => {
  const w=260, h=44, mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-(((v-mn)/rng)*h*.75+h*.12)}`).join(' ');
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
};

// ── Actions ────────────────────────────────────────────────
function go(name) {
  S.screen = name;
  ['home','plan','nutricion','progreso','coach'].forEach(id => {
    const el = document.getElementById(`n-${id}`);
    if(el) el.classList.toggle('active', id===name);
  });
  render();
}

function toggleTheme() {
  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
}

function openExercise(idx) {
  S.exerciseIdx = idx;
  S.exerciseVideo = false;
  S.sheet = 'exercise';
  render();
}

function closeExercise() {
  S.sheet = null;
  S.exerciseIdx = null;
  S.exerciseVideo = false;
  render();
}

function loadVideo(exIdx) {
  S.exerciseVideo = true;
  renderSheet();
}

function toggleSerie(exIdx, serieIdx) {
  S.seriesState[exIdx][serieIdx].done = !S.seriesState[exIdx][serieIdx].done;
  renderSheet();
}

function addSerie(exIdx) {
  const last = S.seriesState[exIdx].slice(-1)[0];
  S.seriesState[exIdx].push({kg:last.kg, reps:last.reps, done:false});
  renderSheet();
}

function updateSerieVal(exIdx, serieIdx, field, value) {
  const n = parseFloat(value);
  if(!isNaN(n)) S.seriesState[exIdx][serieIdx][field] = n;
}

function toggleSensacion(s) {
  if(S.sensaciones.includes(s)) S.sensaciones = S.sensaciones.filter(x=>x!==s);
  else S.sensaciones.push(s);
  renderSheet();
}

function progresoEx(name) {
  S.progresoExercise = S.progresoExercise === name ? null : name;
  render();
}

function sendChat(text) {
  const inp = document.getElementById('chat-in');
  const val = (text || (inp && inp.value) || '').trim();
  if(!val) return;
  if(inp) inp.value = '';
  S.chatMsgs.push({from:'user', text:val});
  S.chatThinking = true;
  render();
  setTimeout(() => {
    const t = val.toLowerCase();
    let reply = 'Lo tengo. Reviso tu plan y te doy una propuesta concreta.';

    if(t.includes('garabitas'))
      reply = 'La vuelta de Garabitas de ayer fue perfecta: 71% en Z2, TSS 84, FC media 138 bpm y Pot. norm. 178w. Todo dentro del objetivo. Para la de hoy mantén el mismo ritmo — cadencia 87–92 rpm y FC entre 130 y 145.';
    else if(t.includes('hrv'))
      reply = 'Tu HRV hoy es 62ms, 4ms por encima de tu media de las últimas 4 semanas. Eso, junto con los Recursos al 94%, confirma que estás en plena forma. Puedes entrenar con plena intensidad en el doble de hoy.';
    else if(t.includes('tss'))
      reply = 'Llevas 312 TSS esta semana en 3 de 4 sesiones. La salida de hoy añadirá ~84 TSS más, cerrando en ~396, muy cerca del objetivo de 400. Está en la zona ideal para seguir cargando sin riesgo de sobreentrenar.';
    else if(t.includes('z2'))
      reply = 'Para mantenerte en Z2 en Garabitas: FC entre 130 y 145 bpm, ritmo conversacional. Si subes la Cuesta de las Perdices deja que la FC suba puntualmente, pero no te quedes ahí más de 2 min. Cadencia ≥85 rpm te ayuda a no pisar el acelerador.';
    else if(t.includes('sueño')||t.includes('sueno')||t.includes('dormi'))
      reply = 'Anoche dormiste 7h 20m con 1h 40m de sueño profundo — mejor que tu media de 6h 50m. Eso explica el HRV de 62ms y los recursos al 94%. Sigue con ese horario esta semana, estás respondiendo muy bien.';
    else if(t.includes('peso'))
      reply = 'Estás en 76,2 kg, bajando 1,2 kg en 4 semanas a ritmo controlado. Con el déficit actual y las 2.640 kcal de hoy (doble sesión), el modelo apunta a llegar a 75 kg en 3–4 semanas sin perder músculo. Músculo +0,4 kg en el período — excelente composición.';
    else if(t.includes('cargado')||t.includes('cansado')||t.includes('cambio'))
      reply = 'Con ese feedback bajo la intensidad: en lugar de Z2 90′, hago 60′ Z1–Z2 suave. Pasa la cena a más carbos para recuperar. Tu HRV está en 62ms — mañana deberías estar fino si descansas bien esta noche.';
    else if(t.includes('como')||t.includes('antes')||t.includes('salida'))
      reply = 'Para la salida de 90 min: 60–90 min antes, porridge con plátano y miel (~420 kcal, 68g carbos). Durante la salida, 1–2 geles cada 45 min y bebida isotónica con sodio. Con TSS acumulado de 312 esta semana, no salgas en ayunas.';
    else if(t.includes('espinacas'))
      reply = 'Sin problema. Las cambio por kale o canónigos en la receta de hoy. Si no tienes hoja verde, brócoli o judías verdes ajustan los micros igual de bien.';
    else if(t.includes('volumen'))
      reply = 'Esta semana es de carga máxima (objetivo 400 TSS). Tu HRV lleva 5 días estable por encima de 60ms y el peso baja lento — buena señal para seguir subiendo. La próxima semana toca descarga: −30% de volumen.';

    S.chatThinking = false;
    S.chatMsgs.push({from:'ai', text:reply});
    render();
    setTimeout(()=>{const s=document.getElementById('chat-scroll');if(s)s.scrollTop=s.scrollHeight;},50);
  }, 950);
}

// ── Render ─────────────────────────────────────────────────
const SHEETS = {
  summary: SHEET_SUMMARY,
  exercise: SHEET_EXERCISE,
  ajustes: SHEET_AJUSTES,
};

function renderSheet() {
  const overlay = document.getElementById('sheet-overlay');
  if(!overlay) return;
  const fn = SHEETS[S.sheet];
  if(fn) overlay.innerHTML = fn();
}

function render() {
  const scr = document.getElementById('screen');
  const fn = SCREENS[S.screen];
  if(fn) scr.innerHTML = fn();

  const existing = document.getElementById('sheet-overlay');
  if(S.sheet && SHEETS[S.sheet]) {
    const div = existing || document.createElement('div');
    div.id = 'sheet-overlay';
    div.innerHTML = SHEETS[S.sheet]();
    if(!existing) document.getElementById('app').appendChild(div);
  } else {
    if(existing) existing.remove();
  }

  if(S.screen==='coach') {
    setTimeout(()=>{const s=document.getElementById('chat-scroll');if(s)s.scrollTop=s.scrollHeight;},30);
  }
}

// ── Live data loader ────────────────────────────────────────
async function loadLiveData() {
  const jobs = [];
  if(stravaConnected()) {
    jobs.push(
      loadStravaData().then(d => {
        if(!d.activities?.length) return;
        // Última actividad de ciclismo
        const lastRide = d.activities.find(a => ['Ride','VirtualRide','EBikeRide'].includes(a.type)) || d.activities[0];
        S.liveData.lastActivity = fmtActivity(lastRide);
        // TSS semanal
        const weekAgo = Date.now() - 7*86400000;
        const week = d.activities.filter(a => new Date(a.start_date_local).getTime() > weekAgo);
        S.liveData.weeklyTSS = week.reduce((s,a) => s + (calcTSS(a)||0), 0);
        S.liveData.weeklyRides = week.filter(a => a.type==='Ride').length;
        S.liveData.weeklyKm = +(week.reduce((s,a) => s + a.distance, 0)/1000).toFixed(1);
      }).catch(()=>{})
    );
  }
  if(withingsConnected()) {
    jobs.push(
      loadWithingsData().then(d => {
        S.liveData.body = parseWithings(d.measures);
      }).catch(()=>{})
    );
  }
  await Promise.all(jobs);
}

// ── Background sync ────────────────────────────────────────
let _syncing = false;

async function silentRefresh() {
  if (_syncing || !stravaConnected()) return;
  _syncing = true;
  showSyncDot(true);
  DCACHE.clear('strava');
  try { await loadLiveData(); render(); } catch(e) {}
  _syncing = false;
  showSyncDot(false);
}

function showSyncDot(on) {
  const el = document.getElementById('sync-dot');
  if (el) el.style.opacity = on ? '1' : '0';
}

// Refresca al volver a la app (minimize → reabrir)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') silentRefresh();
});

// Polling cada 5 min mientras la app está en primer plano
setInterval(() => {
  if (document.visibilityState === 'visible') silentRefresh();
}, 5 * 60 * 1000);

// ── App init (handles OAuth callback) ─────────────────────
async function initApp() {
  const p = new URLSearchParams(location.search);
  const code = p.get('code'), state = p.get('state');
  if(code && (state==='strava' || state==='withings')) {
    history.replaceState({}, '', location.pathname);
    S.sheet = 'ajustes';
    try {
      if(state==='strava') {
        await stravaExchange(code);
        S.ajMsg = '✓ Strava conectado correctamente.';
      } else {
        await withingsExchange(code);
        S.ajMsg = '✓ Withings conectado correctamente.';
      }
    } catch(e) {
      S.ajErr = 'Error al conectar: ' + e.message;
    }
  }
  await loadLiveData();
  render();
}

// ── Clock ──────────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  const el = document.getElementById('clock');
  if(el) el.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 10000);

initApp();

// ── Service Worker ─────────────────────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
